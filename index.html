<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Modern DXF Viewer</title>
    <style>
        :root { --bg-color: #707070; }
        body { margin: 0; overflow: hidden; background-color: var(--bg-color); font-family: 'Inter', sans-serif; color: white; }
        
        #ui-layer { 
            position: absolute; top: 25px; left: 25px; z-index: 100;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            padding: 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Yükleniyor Ekranı */
        #loader {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5); display: none; /* Varsayılan gizli */
            justify-content: center; align-items: center; z-index: 999;
            color: white; font-size: 20px;
        }

        h2 { margin: 0 0 15px 0; font-size: 20px; }
        input[type="file"] { width: 100%; cursor: pointer; }
        .hint { font-size: 13px; margin-top: 15px; opacity: 0.8; }
        #viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="loader">Dosya işleniyor, lütfen bekleyin...</div>

    <div id="ui-layer">
        <h2>DWG/DXF Görüntüleyici</h2>
        <input type="file" id="fileInput" accept=".dxf">
        <p class="hint">Dosya yüklendikten sonra tarayıcıyı dondurabilir, çok büyük dosyalarda biraz bekletir.</p>
    </div>

    <div id="viewer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dxf-parser@latest/dist/dxf-parser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three-dxf@latest/dist/three-dxf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const loader = document.getElementById('loader');
        const viewerDiv = document.getElementById('viewer');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x707070);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        viewerDiv.appendChild(renderer.domElement);
        camera.position.z = 800;

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            loader.style.display = 'flex'; // Yükleniyor'u göster

            // Küçük bir gecikme ekleyerek tarayıcının DOM'u güncellemesine izin veriyoruz
            setTimeout(() => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const parser = new DxfParser();
                        const dxfData = parser.parseSync(event.target.result);
                        
                        while(scene.children.length > 0) { scene.remove(scene.children[0]); }

                        const group = new ThreeDxf.Viewer(dxfData, 1000, 800);
                        scene.add(group);
                    } catch (err) {
                        alert("Dosya okunamadı! DXF dosyası olduğundan emin olun.");
                        console.error(err);
                    } finally {
                        loader.style.display = 'none'; // İşlem bitince kapat
                    }
                };
                reader.readAsText(file);
            }, 100);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
