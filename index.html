<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel DXF Görüntüleyici (Standalone)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #151515;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        #drop-zone {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.9);
            padding: 20px;
            border-radius: 8px;
            border: 2px dashed #444;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #drop-zone.hover {
            border-color: #00adb5;
            background: rgba(0, 173, 181, 0.1);
        }
        #file-input { display: none; }
        .btn {
            background: #00adb5;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
        }
        .btn:hover { background: #008f95; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.9);
            padding: 12px 18px;
            border-radius: 5px;
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
            border-left: 4px solid #00adb5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // Minimalist ve Hata Toleranslı Custom DXF Parser Motoru
        const CustomDxfParser = {
            parse: function(text) {
                const lines = text.split(/\r\n|\r|\n/);
                const entities = [];
                let currentEntity = null;
                let groupCode = null;
                
                for (let i = 0; i < lines.length; i += 2) {
                    if(!lines[i]) continue;
                    groupCode = parseInt(lines[i].trim(), 10);
                    const value = lines[i + 1] ? lines[i + 1].trim() : '';
                    
                    if (groupCode === 0) { // Yeni bir obje veya section başladı
                        if (currentEntity) {
                            entities.push(currentEntity);
                        }
                        if (['LINE', 'LWPOLYLINE', 'POLYLINE', 'VERTEX'].includes(value)) {
                            currentEntity = { type: value, vertices: [] };
                        } else {
                            currentEntity = null;
                        }
                    } else if (currentEntity) {
                        // LINE koordinatları
                        if (currentEntity.type === 'LINE') {
                            if (groupCode === 10) currentEntity.x1 = parseFloat(value);
                            if (groupCode === 20) currentEntity.y1 = parseFloat(value);
                            if (groupCode === 30) currentEntity.z1 = parseFloat(value);
                            if (groupCode === 11) currentEntity.x2 = parseFloat(value);
                            if (groupCode === 21) currentEntity.y2 = parseFloat(value);
                            if (groupCode === 31) currentEntity.z2 = parseFloat(value);
                        }
                        // LWPOLYLINE vertex koordinatları
                        if (currentEntity.type === 'LWPOLYLINE') {
                            if (groupCode === 70) currentEntity.closed = (parseInt(value, 10) & 1) === 1;
                            if (groupCode === 10) {
                                currentEntity.vertices.push({ x: parseFloat(value), y: 0, z: 0 });
                            }
                            if (groupCode === 20 && currentEntity.vertices.length > 0) {
                                currentEntity.vertices[currentEntity.vertices.length - 1].y = parseFloat(value);
                            }
                        }
                    }
                }
                if (currentEntity) entities.push(currentEntity);
                return entities;
            }
        };
    </script>
</head>
<body>

    <div id="drop-zone">
        <h3>Profesyonel DXF Görüntüleyici</h3>
        <p>AutoCAD 2000 ASCII DXF dosyasını buraya sürükleyin</p>
        <label for="file-input" class="btn">Dosya Seç</label>
        <input type="file" id="file-input" accept=".dxf">
    </div>

    <div id="info">Dosya bekleniyor... Kaydırmak için mouse sağ tıkını, yaklaşmak için tekerleği kullanın.</div>
    <div id="canvas-container"></div>

    <script>
        // --- 1. Three.js Sahne Kurulumu ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x151515);

        const aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.OrthographicCamera(-100 * aspect, 100 * aspect, 100, -100, 1, 100000);
        camera.position.set(0, 0, 5000);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableRotate = false; // Harita/Plan modu için rotasyon kapalı
        controls.screenSpacePanning = true;

        // Orijin Göstergesi
        scene.add(new THREE.AxesHelper(100));

        let currentLineMesh = null;

        // --- 2. Dosya Yakalama Mimarisi ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const infoDiv = document.getElementById('info');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            infoDiv.innerHTML = "Dosya ikili metin olarak okunuyor...";
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const entities = CustomDxfParser.parse(e.target.result);
                    renderDxfEntities(entities, file.name);
                } catch (err) {
                    console.error(err);
                    infoDiv.innerHTML = "<span style='color:#ff5a5a;'>Renderer Hatası! Konsolu inceleyin.</span>";
                }
            };
            reader.readAsText(file);
        }

        // --- 3. Custom Renderer Logic ---
        function renderDxfEntities(entities, fileName) {
            if (currentLineMesh) scene.remove(currentLineMesh);

            const points = [];

            entities.forEach(entity => {
                if (entity.type === 'LINE') {
                    points.push(entity.x1 || 0, entity.y1 || 0, entity.z1 || 0);
                    points.push(entity.x2 || 0, entity.y2 || 0, entity.z2 || 0);
                } 
                else if (entity.type === 'LWPOLYLINE' && entity.vertices.length > 1) {
                    for (let i = 0; i < entity.vertices.length - 1; i++) {
                        points.push(entity.vertices[i].x, entity.vertices[i].y, 0);
                        points.push(entity.vertices[i+1].x, entity.vertices[i+1].y, 0);
                    }
                    if (entity.closed) {
                        points.push(entity.vertices[entity.vertices.length - 1].x, entity.vertices[entity.vertices.length - 1].y, 0);
                        points.push(entity.vertices[0].x, entity.vertices[0].y, 0);
                    }
                }
            });

            if (points.length === 0) {
                infoDiv.innerHTML = "<span style='color:yellow;'>Çizilebilir lineer obje bulunamadı (Katmanlar boş veya desteklenmiyor olabilir).</span>";
                return;
            }

            // Tek bir büyük buffer oluşturup GPU'ya itiyoruz
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
            
            const material = new THREE.LineBasicMaterial({ color: 0x00adb5 });
            currentLineMesh = new THREE.LineSegments(geometry, material);
            scene.add(currentLineMesh);

            // --- 4. Otomatik Kamera Boyutlandırma (Zoom to Fit) ---
            geometry.computeBoundingBox();
            const box = geometry.boundingBox;
            const center = new THREE.Vector3();
            box.getCenter(center);
            controls.target.copy(center);

            const size = new THREE.Vector3();
            box.getSize(size);
            const maxDim = Math.max(size.x, size.y);
            
            const padding = 1.15;
            camera.top = maxDim / 2 * padding;
            camera.bottom = -maxDim / 2 * padding;
            camera.left = (-maxDim / 2 * aspect) * padding;
            camera.right = (maxDim / 2 * aspect) * padding;
            
            camera.position.set(center.x, center.y, 5000);
            camera.updateProjectionMatrix();
            controls.update();

            infoDiv.innerHTML = `<b>${fileName}</b> yüklendi.<br>Çizgi Sayısı: ~${Math.floor(points.length / 6)}`;
        }

        // --- 5. Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            const newAspect = window.innerWidth / window.innerHeight;
            const height = camera.top - camera.bottom;
            camera.left = -height * newAspect / 2;
            camera.right = height * newAspect / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
