<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DXF Viewer Pro</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#707070;
    font-family:Arial;
}

#viewer{
    width:100vw;
    height:100vh;
}

#ui{
    position:absolute;
    top:15px;
    left:15px;
    z-index:10;
    background:rgba(0,0,0,0.4);
    padding:12px;
    border-radius:10px;
    color:white;
    width:260px;
}

.layer-item{
    display:flex;
    justify-content:space-between;
    margin-top:6px;
    font-size:13px;
}

button{
    width:100%;
    margin-top:6px;
}

#measure{
    margin-top:10px;
    font-size:13px;
}

#loader{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,0.5);
    color:white;
    font-size:20px;
    z-index:99;
}
</style>
</head>

<body>

<div id="loader">Yükleniyor...</div>

<div id="ui">
<input type="file" id="file" accept=".dxf">

<button onclick="setTheme()">Tema Değiştir</button>
<button onclick="zoomExtents()">Zoom Extents</button>

<div id="layers"></div>

<div id="measure">Ölçü: -</div>
</div>

<div id="viewer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene,camera,renderer,controls;

let layerMap = {};
let dxfGroup = new THREE.Group();

let measurePoints = [];
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

let dark = true;

init();

function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x707070);

camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,1,100000);
camera.position.set(0,0,1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

// PAN (orta tuş)
controls.mouseButtons = {
    LEFT: THREE.MOUSE.ROTATE,
    MIDDLE: THREE.MOUSE.PAN,
    RIGHT: THREE.MOUSE.DOLLY
};

scene.add(dxfGroup);

window.addEventListener("resize",onResize);
renderer.domElement.addEventListener("click",onMeasure);

animate();

}

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}

function onResize(){
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
}

document.getElementById("file").addEventListener("change",e=>{

let file = e.target.files[0];
if(!file) return;

document.getElementById("loader").style.display="flex";

let reader = new FileReader();

reader.onload = ev=>{

try{

clearScene();

let parser = new DxfParser();
let dxf = parser.parseSync(ev.target.result);

// layer oluştur
createLayers(dxf);

dxf.entities.forEach(ent=>{
drawEntity(ent);
});

buildLayerUI();
zoomExtents();

}catch(err){
console.error(err);
alert(err.message);
}
finally{
document.getElementById("loader").style.display="none";
}

};

reader.readAsText(file,"utf-8");

});

function clearScene(){

while(dxfGroup.children.length){
dxfGroup.remove(dxfGroup.children[0]);
}

layerMap = {};
document.getElementById("layers").innerHTML="";

}

function getLayer(name){

if(!layerMap[name]){
let g = new THREE.Group();
g.visible = true;
layerMap[name] = g;
dxfGroup.add(g);
}

return layerMap[name];
}

function createLayers(dxf){

if(!dxf.tables?.layer?.layers) return;

for(let l of dxf.tables.layer.layers){
getLayer(l.name);
}

}

function colorByLayer(layerName){

// basit renk hash
let hash = 0;
for(let i=0;i<layerName.length;i++){
hash = layerName.charCodeAt(i)+((hash<<5)-hash);
}
return new THREE.Color(hash & 0xffffff);
}

function drawEntity(e){

let layer = getLayer(e.layer || "0");

let mat = new THREE.LineBasicMaterial({
color: colorByLayer(e.layer || "0")
});

if(e.type === "LINE"){

let geo = new THREE.BufferGeometry().setFromPoints([
new THREE.Vector3(e.vertices[0].x,e.vertices[0].y,0),
new THREE.Vector3(e.vertices[1].x,e.vertices[1].y,0)
]);

layer.add(new THREE.Line(geo,mat));
}

if(e.type === "LWPOLYLINE" || e.type==="POLYLINE"){

let pts = e.vertices.map(v=>new THREE.Vector3(v.x,v.y,0));

if(e.shape) pts.push(pts[0]);

let geo = new THREE.BufferGeometry().setFromPoints(pts);

layer.add(new THREE.Line(geo,mat));
}

if(e.type === "CIRCLE"){

let curve = new THREE.EllipseCurve(
e.center.x,e.center.y,
e.radius,e.radius,0,Math.PI*2
);

let pts = curve.getPoints(50);

let geo = new THREE.BufferGeometry().setFromPoints(
pts.map(p=>new THREE.Vector3(p.x,p.y,0))
);

layer.add(new THREE.Line(geo,mat));
}

}

function buildLayerUI(){

let ui = document.getElementById("layers");
ui.innerHTML="";

Object.keys(layerMap).forEach(name=>{

let div = document.createElement("div");
div.className="layer-item";

let btn = document.createElement("button");
btn.innerText = name;

btn.onclick = ()=>{

layerMap[name].visible = !layerMap[name].visible;

btn.style.opacity = layerMap[name].visible ? "1":"0.3";

};

div.appendChild(btn);
ui.appendChild(div);

});

}

function zoomExtents(){

let box = new THREE.Box3().setFromObject(dxfGroup);
let size = box.getSize(new THREE.Vector3());
let center = box.getCenter(new THREE.Vector3());

controls.target.copy(center);

let max = Math.max(size.x,size.y);

let dist = max / Math.tan((camera.fov*Math.PI/180)/2);
camera.position.set(center.x,center.y,dist*1.2);

camera.updateProjectionMatrix();
}

function setTheme(){

dark = !dark;

scene.background = new THREE.Color(dark ? 0x111111 : 0x707070);

}

function onMeasure(e){

mouse.x = (e.clientX/window.innerWidth)*2-1;
mouse.y = -(e.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(mouse,camera);

let point = raycaster.ray.origin.clone().add(
raycaster.ray.direction.clone().multiplyScalar(1000)
);

measurePoints.push(point);

if(measurePoints.length === 2){

let dist = measurePoints[0].distanceTo(measurePoints[1]);

document.getElementById("measure").innerText =
"Ölçü: " + dist.toFixed(2);

measurePoints = [];

}

}

</script>

</body>
</html>
