<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DXF Viewer FIXED</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#707070;
    font-family:Arial;
}

#viewer{width:100vw;height:100vh;}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-radius:10px;
    color:white;
    width:250px;
}

.layer-btn{
    display:block;
    width:100%;
    margin-top:5px;
}
</style>
</head>

<body>

<div id="ui">
<input type="file" id="file" accept=".dxf">
<button onclick="zoomExtents()">Zoom</button>
<button onclick="toggleTheme()">Theme</button>
<div id="layers"></div>
</div>

<div id="viewer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene,camera,renderer,controls;
let group = new THREE.Group();
let layers = {};
let dark = true;

init();

function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x707070);

camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,1,100000);
camera.position.set(0,0,1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

controls.mouseButtons = {
LEFT: THREE.MOUSE.ROTATE,
MIDDLE: THREE.MOUSE.PAN,
RIGHT: THREE.MOUSE.DOLLY
};

scene.add(group);

window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

animate();

}

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}

document.getElementById("file").addEventListener("change",e=>{

let file=e.target.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=ev=>{

try{

clear();

const parser=new DxfParser();
const dxf=parser.parseSync(ev.target.result);

console.log("DXF loaded:",dxf);

dxf.entities.forEach(ent=>{
draw(ent);
});

buildLayers();

zoomExtents();

}catch(err){
console.error(err);
alert(err.message);
}

};

reader.readAsText(file);

});

function clear(){
while(group.children.length){
group.remove(group.children[0]);
}
layers={};
document.getElementById("layers").innerHTML="";
}

function getLayer(name){
if(!layers[name]){
let g=new THREE.Group();
g.visible=true;
layers[name]=g;
group.add(g);
}
return layers[name];
}

function color(layer){
let h=0;
for(let i=0;i<layer.length;i++){
h=layer.charCodeAt(i)+((h<<5)-h);
}
return new THREE.Color(h & 0xffffff);
}

function draw(e){

let layer = getLayer(e.layer || "0");

let mat = new THREE.LineBasicMaterial({
color: color(e.layer || "0")
});

if(e.type==="LINE"){

const geo=new THREE.BufferGeometry().setFromPoints([
new THREE.Vector3(e.vertices[0].x,e.vertices[0].y,0),
new THREE.Vector3(e.vertices[1].x,e.vertices[1].y,0)
]);

layer.add(new THREE.Line(geo,mat));
}

if(e.type==="LWPOLYLINE"){

const pts=e.vertices.map(v=>new THREE.Vector3(v.x,v.y,0));

layer.add(new THREE.Line(
new THREE.BufferGeometry().setFromPoints(pts),
mat
));
}

if(e.type==="CIRCLE"){

let curve=new THREE.EllipseCurve(
e.center.x,e.center.y,
e.radius,e.radius,
0,Math.PI*2
);

let pts=curve.getPoints(50);

layer.add(new THREE.Line(
new THREE.BufferGeometry().setFromPoints(
pts.map(p=>new THREE.Vector3(p.x,p.y,0))
),
mat
));
}

}

function buildLayers(){

let ui=document.getElementById("layers");

Object.keys(layers).forEach(name=>{

let btn=document.createElement("button");
btn.className="layer-btn";
btn.innerText=name;

btn.onclick=()=>{

layers[name].visible=!layers[name].visible;
btn.style.opacity=layers[name].visible?1:0.3;

};

ui.appendChild(btn);

});

}

function zoomExtents(){

let box=new THREE.Box3().setFromObject(group);

let center=box.getCenter(new THREE.Vector3());
let size=box.getSize(new THREE.Vector3());

controls.target.copy(center);

let max=Math.max(size.x,size.y);

let dist=max/Math.tan((camera.fov*Math.PI/180)/2);

camera.position.set(center.x,center.y,dist*1.2);

}

function toggleTheme(){
dark=!dark;
scene.background=new THREE.Color(dark?0x111111:0x707070);
}

</script>

</body>
</html>
