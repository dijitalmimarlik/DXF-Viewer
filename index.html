<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel DXF Görüntüleyici</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        #drop-zone {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border-radius: 8px;
            border: 2px dashed #444;
            z-index: 10;
            transition: all 0.3s ease;
        }
        #drop-zone.hover {
            border-color: #00adb5;
            background: rgba(0, 173, 181, 0.1);
        }
        #file-input {
            display: none;
        }
        .btn {
            background: #00adb5;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            display: inline-block;
        }
        .btn:hover { background: #008f95; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.lic.min.js"></script>
</head>
<body>

    <div id="drop-zone">
        <h3>DXF Görüntüleyici</h3>
        <p>Dosyayı buraya sürükleyin veya</p>
        <label for="file-input" class="btn">Dosya Seç</label>
        <input type="file" id="file-input" accept=".dxf">
    </div>

    <div id="info">Dosya bekleniyor... Mause sol tık ile döndürebilir, sağ tık ile kaydırabilir, tekerlek ile yaklaşabilirsiniz.</div>
    <div id="canvas-container"></div>

    <script>
        // --- 1. Sahnelerin Kurulumu ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        // CAD/Mimari projeler için Ortografik (Paralel) kamera en doğrusudur
        const aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.OrthographicCamera(-100 * aspect, 100 * aspect, 100, -100, 1, 20000);
        camera.position.set(0, 0, 1000); // Üstten bakış (2D planlar için)

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Kamera Kontrolleri
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableRotate = true; // 3D incelemek istersen döndürmeyi açabilirsin
        controls.screenSpacePanning = true; // CAD yazılımlarındaki gibi sağ tık kaydırma

        // Eksen çizgileri (Orijini görmek için hafifçe ekleyelim)
        const axesHelper = new THREE.AxesHelper(50);
        scene.add(axesHelper);

        let currentDxfMesh = null;

        // --- 2. Sürükle Bırak ve Dosya İşlemleri ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const infoDiv = document.getElementById('info');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            infoDiv.innerHTML = "Dosya okunuyor ve parse ediliyor...";
            const reader = new FileReader();
            reader.onload = function(e) {
                const fileText = e.target.result;
                try {
                    const parser = new DxfParser();
                    const dxf = parser.parseSync(fileText);
                    renderDxf(dxf, file.name);
                } catch (err) {
                    console.error(err);
                    infoDiv.innerHTML = "<span style='color:red;'>Hata: DXF dosyası parse edilemedi!</span>";
                }
            };
            reader.readAsText(file);
        }

        // --- 3. DXF Verisini Three.js Geometrisine Dönüştürme (Renderer) ---
        function renderDxf(dxf, fileName) {
            // Eğer önceden yüklenmiş bir çizim varsa sahneden temizle
            if (currentDxfMesh) scene.remove(currentDxfMesh);

            infoDiv.innerHTML = `<b>${fileName}</b> işleniyor...<br>`;
            
            // Performans için tüm noktaları tek bir büyük dizide toplayacağız (BufferGeometry)
            const points = [];
            
            // DXF içindeki tüm ENTITIES (objeleri) dönüyoruz
            dxf.entities.forEach(entity => {
                // Şimdilik en temel iki yapı olan LINE ve POLYLINE/LWPOLYLINE işleyelim
                if (entity.type === 'LINE') {
                    points.push(entity.vertices[0].x, entity.vertices[0].y, entity.vertices[0].z || 0);
                    points.push(entity.vertices[1].x, entity.vertices[1].y, entity.vertices[1].z || 0);
                } 
                else if ((entity.type === 'POLYLINE' || entity.type === 'LWPOLYLINE') && entity.vertices) {
                    for (let i = 0; i < entity.vertices.length - 1; i++) {
                        points.push(entity.vertices[i].x, entity.vertices[i].y, entity.vertices[i].z || 0);
                        points.push(entity.vertices[i+1].x, entity.vertices[i+1].y, entity.vertices[i+1].z || 0);
                    }
                    // Eğer polyline kapalıysa son noktayı ilk noktaya bağla
                    if (entity.shape || entity.closed) {
                        const first = entity.vertices[0];
                        const last = entity.vertices[entity.vertices.length - 1];
                        points.push(last.x, last.y, last.z || 0);
                        points.push(first.x, first.y, first.z || 0);
                    }
                }
                // İleride ARC, CIRCLE, SPLINE ve TEXT yapılarını buraya custom renderer mantığınla ekleyebilirsin.
            });

            if (points.length === 0) {
                infoDiv.innerHTML += "<br><span style='color:yellow;'>Uyarı: Çizilebilir LINE veya POLYLINE bulunamadı.</span>";
                return;
            }

            // GPU dostu BufferGeometry oluşturma
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));

            // Klasik beyaz CAD çizgisi materyali
            const material = new THREE.LineBasicMaterial({ color: 0xffffff });
            
            // Çizgileri segmentler halinde sahneye basıyoruz
            currentDxfMesh = new THREE.LineSegments(geometry, material);
            scene.add(currentDxfMesh);

            // --- 4. Zoom to Fit (Kamerayı Çizime Göre Odaklama) ---
            geometry.computeBoundingBox();
            const box = geometry.boundingBox;
            
            // Çizimin merkezini bul ve kamerayı/kontrolleri oraya eşitle
            const center = new THREE.Vector3();
            box.getCenter(center);
            controls.target.copy(center);

            // Çizimin boyutunu hesapla ve kameranın görüş alanını (frustum) ayarla
            const size = new THREE.Vector3();
            box.getSize(size);
            const maxDim = Math.max(size.x, size.y);
            
            const padding = 1.2; // Kenarlarda boşluk bırakmak için
            camera.top = maxDim / 2 * padding;
            camera.bottom = -maxDim / 2 * padding;
            camera.left = (-maxDim / 2 * aspect) * padding;
            camera.right = (maxDim / 2 * aspect) * padding;
            
            // Kamerayı objenin tam üstüne taşı ve güncelle
            camera.position.set(center.x, center.y, Math.max(size.z * 2, 1000));
            camera.updateProjectionMatrix();
            controls.update();

            infoDiv.innerHTML += `<br>Başarıyla yüklendi! Obje Sayısı: ~${Math.floor(points.length/6)}`;
        }

        // --- 5. Animasyon Döngüsü ve Pencere Yeniden Boyutlandırma ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            const newAspect = window.innerWidth / window.innerHeight;
            
            // Ortografik kameranın oranlarını güncelle
            const height = camera.top - camera.bottom;
            camera.left = -height * newAspect / 2;
            camera.right = height * newAspect / 2;
            
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
