<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Modern DXF Viewer</title>
    <style>
        /* Modern Tasarım ve Renk Paleti */
        :root { 
            --bg-color: #707070; /* CAD Grisi */
            --glass-bg: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: var(--bg-color); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: var(--text-color); 
        }

        /* Cam Efektli (Glassmorphism) Kontrol Paneli */
        #ui-layer { 
            position: absolute; 
            top: 25px; 
            left: 25px; 
            z-index: 100;
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            padding: 24px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.2);
            width: 280px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 { margin: 0 0 15px 0; font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
        
        input[type="file"] { 
            background: rgba(0,0,0,0.2); 
            padding: 10px; 
            border-radius: 8px; 
            width: 100%; 
            cursor: pointer; 
            border: none;
            color: white;
        }

        .hint { font-size: 13px; margin-top: 15px; opacity: 0.8; line-height: 1.5; }
        
        #viewer { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>DWG/DXF Görüntüleyici</h2>
        <input type="file" id="fileInput" accept=".dxf">
        <p class="hint">Dosyayı seçin. Fare ile döndürebilir, tekerlek ile yakınlaşabilirsiniz.</p>
    </div>

    <div id="viewer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dxf-parser@latest/dist/dxf-parser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three-dxf@latest/dist/three-dxf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const viewerDiv = document.getElementById('viewer');
        const scene = new THREE.Scene();
        // Arka plan rengini CSS ile aynı gri yapalım (renderer için)
        scene.background = new THREE.Color(0x707070); 
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        viewerDiv.appendChild(renderer.domElement);
        camera.position.z = 800;

        document.getElementById('fileInput').addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const parser = new DxfParser();
                const dxfData = parser.parseSync(event.target.result);
                
                // Eski çizimi temizle
                while(scene.children.length > 0) { scene.remove(scene.children[0]); }

                // Yeni çizimi ekle
                const group = new ThreeDxf.Viewer(dxfData, 1000, 800);
                scene.add(group);
            };
            reader.readAsText(file);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

        // Pencere boyutu değişirse görüntüleyiciyi güncelle
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
