<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DXF Viewer Pro FIX</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#707070;
    font-family:Arial;
}

#viewer{width:100vw;height:100vh;}

#ui{
    position:absolute;
    top:15px;
    left:15px;
    z-index:10;
    background:rgba(0,0,0,0.5);
    padding:12px;
    border-radius:10px;
    color:white;
    width:260px;
    font-size:13px;
}

.layer-item{
    display:flex;
    margin-top:5px;
}

button{
    width:100%;
    margin-top:6px;
}

#measure{
    margin-top:8px;
}
</style>
</head>

<body>

<div id="ui">
<input type="file" id="file" accept=".dxf">

<button onclick="setTheme()">Tema</button>
<button onclick="zoomExtents()">Zoom Extents</button>

<div id="layers"></div>

<div id="measure">Ölçü: -</div>
</div>

<div id="viewer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>

let scene,camera,renderer,controls;
let dxfGroup = new THREE.Group();
let layerMap = {};
let dark=true;

init();

function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x707070);

camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,1,100000);
camera.position.set(0,0,1000);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

controls.mouseButtons = {
LEFT: THREE.MOUSE.ROTATE,
MIDDLE: THREE.MOUSE.PAN,
RIGHT: THREE.MOUSE.DOLLY
};

scene.add(dxfGroup);

window.addEventListener("resize",onResize);

animate();

}

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}

function onResize(){
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
}

document.getElementById("file").addEventListener("change",e=>{

let file=e.target.files[0];
if(!file) return;

let reader=new FileReader();

reader.onload=ev=>{

try{

clear();

let parser=new DxfParser();
let dxf=parser.parseSync(ev.target.result);

// 🔥 FIX: layer güvenli okuma
let layers = extractLayers(dxf);

for(let name of layers){
getLayer(name);
}

dxf.entities.forEach(ent=>{
draw(ent);
});

buildUI();
zoomExtents();

}catch(err){
console.error(err);
alert(err.message);
}

};

reader.readAsText(file,"utf-8");

});

function extractLayers(dxf){

// CASE 1
if(dxf.tables?.layer?.layers &&
Array.isArray(dxf.tables.layer.layers)){

return dxf.tables.layer.layers.map(l=>l.name);
}

// CASE 2 (OBJECT)
if(dxf.tables?.layer?.layers &&
typeof dxf.tables.layer.layers === "object"){

return Object.keys(dxf.tables.layer.layers);
}

// CASE 3 (fallback)
return [...new Set(dxf.entities.map(e=>e.layer || "0"))];

}

function clear(){

while(dxfGroup.children.length){
dxfGroup.remove(dxfGroup.children[0]);
}

layerMap={};
document.getElementById("layers").innerHTML="";

}

function getLayer(name){

if(!layerMap[name]){

let g=new THREE.Group();
layerMap[name]=g;
dxfGroup.add(g);

}

return layerMap[name];

}

function color(layer){

let h=0;
for(let i=0;i<layer.length;i++){
h=layer.charCodeAt(i)+((h<<5)-h);
}
return new THREE.Color(h & 0xffffff);

}

function draw(e){

let layer=getLayer(e.layer||"0");

let mat=new THREE.LineBasicMaterial({
color:color(e.layer||"0")
});

if(e.type==="LINE"){

let geo=new THREE.BufferGeometry().setFromPoints([
new THREE.Vector3(e.vertices[0].x,e.vertices[0].y,0),
new THREE.Vector3(e.vertices[1].x,e.vertices[1].y,0)
]);

layer.add(new THREE.Line(geo,mat));
}

if(e.type==="LWPOLYLINE"||e.type==="POLYLINE"){

let pts=e.vertices.map(v=>new THREE.Vector3(v.x,v.y,0));

if(e.shape) pts.push(pts[0]);

layer.add(new THREE.Line(
new THREE.BufferGeometry().setFromPoints(pts),
mat
));
}

if(e.type==="CIRCLE"){

let c=new THREE.EllipseCurve(
e.center.x,e.center.y,
e.radius,e.radius,0,Math.PI*2
);

let pts=c.getPoints(50);

layer.add(new THREE.Line(
new THREE.BufferGeometry().setFromPoints(
pts.map(p=>new THREE.Vector3(p.x,p.y,0))
),
mat
));
}

}

function buildUI(){

let ui=document.getElementById("layers");

Object.keys(layerMap).forEach(name=>{

let d=document.createElement("div");
d.className="layer-item";

let b=document.createElement("button");
b.innerText=name;

b.onclick=()=>{
layerMap[name].visible=!layerMap[name].visible;
b.style.opacity=layerMap[name].visible?1:0.3;
};

d.appendChild(b);
ui.appendChild(d);

});

}

function zoomExtents(){

let box=new THREE.Box3().setFromObject(dxfGroup);

let size=box.getSize(new THREE.Vector3());
let center=box.getCenter(new THREE.Vector3());

controls.target.copy(center);

let max=Math.max(size.x,size.y);

let dist=max/Math.tan((camera.fov*Math.PI/180)/2);

camera.position.set(center.x,center.y,dist*1.2);

}

function setTheme(){

dark=!dark;

scene.background=new THREE.Color(
dark?0x111111:0x707070
);

}

function animate(){}

</script>

</body>
</html>
