<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Modern DXF Viewer</title>
    <style>
        /* Arka planı gri (#808080) olarak güncelledik */
        :root { --bg-color: #808080; --glass: rgba(255, 255, 255, 0.15); }
        
        body { margin: 0; overflow: hidden; background: var(--bg-color); font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Şık Kontrol Paneli */
        #ui-layer { 
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            width: 250px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        h2 { margin: 0 0 15px 0; font-size: 18px; opacity: 0.9; }
        input[type="file"] { width: 100%; cursor: pointer; }
        .hint { font-size: 12px; margin-top: 10px; color: #eee; }
        
        #viewer { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>DXF Görüntüleyici</h2>
        <input type="file" id="fileInput" accept=".dxf">
        <p class="hint">Dosyayı seçin veya sürükleyin.</p>
    </div>

    <div id="viewer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dxf-parser@latest/dist/dxf-parser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three-dxf@latest/dist/three-dxf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const viewerDiv = document.getElementById('viewer');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        // OrbitControls ayarı
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        viewerDiv.appendChild(renderer.domElement);
        camera.position.z = 800;

        document.getElementById('fileInput').addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(event) {
                const parser = new DxfParser();
                const dxfData = parser.parseSync(event.target.result);
                
                // Eski çizimi temizle
                while(scene.children.length > 0) { scene.remove(scene.children[0]); }

                // Yeni çizimi ekle
                const group = new ThreeDxf.Viewer(dxfData, 1000, 800);
                scene.add(group);
            };
            reader.readAsText(file);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
